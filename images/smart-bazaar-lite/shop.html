<!DOCTYPE html>
<html>
<head>
    <title>Sanket Bazaar Shop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: Arial; margin:0; padding:0; }
        header { display:flex; justify-content:space-between; align-items:center; background:green; color:white; padding:10px 20px; }
        header h1 { margin:0; }
        header button { padding:8px 15px; background:orange; border:none; cursor:pointer; font-weight:bold; }
        .products { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:20px; padding:20px; }
        .product { border:1px solid #ddd; padding:10px; border-radius:8px; text-align:center; }
        .product img { width:150px; height:150px; object-fit:cover; }
        .product button { padding:6px 10px; background:green; color:white; border:none; cursor:pointer; margin-top:5px; }

        /* Cart Modal */
        #cart-modal { display:none; position:fixed; top:50px; right:50px; width:300px; max-height:400px; overflow-y:auto; background:white; border:1px solid #333; border-radius:8px; padding:10px; box-shadow:0 0 10px rgba(0,0,0,0.5); z-index:10; }
        #cart-modal h3 { margin-top:0; }
        #cart-modal button { margin-top:10px; width:100%; padding:8px; background:green; color:white; border:none; cursor:pointer; }
        #cart-items { margin-bottom:10px; }
        .cart-item { display:flex; justify-content:space-between; margin-bottom:5px; }
        #payment-method { width:100%; padding:6px; margin-top:5px; }
    </style>
</head>
<body>

<header>
    <h1>🛒 Sanket Bazaar Shop</h1>
    <button id="cart-btn" onclick="toggleCart()">Cart (0)</button>
</header>

<h2 style="text-align:center;">Products</h2>

<div class="products">

    <div class="product">
        <img src="images/rice.jpg" alt="Basmati Rice">
        <h3>Basmati Rice</h3>
        <p>₹120</p>
        <button onclick="addToCart('Basmati Rice',120)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="images/spices.jpg" alt="Indian Spices">
        <h3>Indian Spices</h3>
        <p>₹80</p>
        <button onclick="addToCart('Indian Spices',80)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="images/vegetables.jpg" alt="Fresh Vegetables">
        <h3>Fresh Vegetables</h3>
        <p>₹60</p>
        <button onclick="addToCart('Fresh Vegetables',60)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="images/fruits.jpg" alt="Seasonal Fruits">
        <h3>Seasonal Fruits</h3>
        <p>₹90</p>
        <button onclick="addToCart('Seasonal Fruits',90)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="images/oil.jpg" alt="Cooking Oil">
        <h3>Cooking Oil</h3>
        <p>₹150</p>
        <button onclick="addToCart('Cooking Oil',150)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="images/tea.jpg" alt="Indian Tea">
        <h3>Indian Tea</h3>
        <p>₹200</p>
        <button onclick="addToCart('Indian Tea',200)">Add to Cart</button>
    </div>

</div>

<!-- Cart Modal -->
<div id="cart-modal">
    <h3>Your Cart</h3>
    <div id="cart-items"></div>
    <p id="cart-total"></p>
    <h4>Payment Method</h4>
    <select id="payment-method">
        <option value="Cash on Delivery">Cash on Delivery</option>
        <option value="UPI">UPI</option>
        <option value="Card">Credit/Debit Card</option>
    </select>
    <button onclick="checkout()">Order Now</button>
    <button onclick="clearCart()">Clear Cart</button>
</div>

<script src="script.js"></script>
</body>
</html>
